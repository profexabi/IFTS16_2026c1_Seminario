<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico

    <link rel="stylesheet" href="css/styles.css">
    <!-- Presets CSS cssbed.com -->

</head>
<body>

    <header>
        <div id="logo">
            <img src="assets/img/pumpernic-cuadrado.png" class="logo" alt="Logo pumpernic">
        </div>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Dashboard</a>
                </li>
                <li>
                    <a href="get.html">Encontrar</a>
                </li>
                <li>
                    <a href="create.html">Crear</a>
                </li>
                <li>
                    <a href="update.html">Modificar</a>
                </li>
                <li>
                    <a href="delete.html">Eliminar</a>
                </li>
            </ul>
        </nav>
    </header>
    <h1>Consultar producto por id</h1>

    <main>
        <form id="getProduct-form" class="formConsultaProducto">
            <label for="idProd">Id del producto</label>
            <input type="number" name="idProd" id="idProd" required>

            <input type="submit" value="Consultar producto" class="btn-envio">
        </form>

        <hr>

        <div id="contenedor-productos">
            <!--
            <div class="card-producto">
                <img src="https://cdn11.bigcommerce.com/s-3stx4pub31/images/stencil/160w/products/9026/27419/Fernet_Branca_Herbal_Infusion_Bitter_Amaro_Liqueur_Genuine_Argentina_Flavor_Recipe_750_ml_25.4_oz_pack_of_2__06645.1707510967.jpg?c=3" alt="fernet branca" class="img-producto">
                <h3>Fernet Branca</h3>
                <p>Id: 1</p>
                <p>7000$</p>
            </div>
            -->
        </div>
    </main>

    <script>
        let contenedorProductos = document.getElementById("contenedor-productos");
        let getProductForm = document.getElementById("getProduct-form");
        const url = "http://localhost:3000/api/products/";


        getProductForm.addEventListener("submit", async event => {

            // Prevenimos el envio por defecto del formulario
            event.preventDefault();

            // Agarramos el valor del campo de idProd
            const idProd = event.target.idProd.value.trim();

            // Vamos a hacer el fetch a la url personalizada
            try {

                // Solicitud HTTP GET
                const response = await fetch(`${url}${idProd}`);

                // Parseo de datos JSON recibidos
                const datos = await response.json();

                // Evaluamos si el servidor respondio correctamete
                if(!response.ok) { // Respuesta no positiva
                    console.error(datos);
                    // mostrarError(datos.error);
                }

                mostrarProductos(datos.payload[0]);



            } catch (error) {
                console.error("Error al obtener el producto: ", error);
            }

        })


        function mostrarProductos(datos) {
            let htmlProducto = "<ul>";

            htmlProducto += `
                <li class="listados">
                    <img src="${datos.image}" alt="${datos.name}" class="img-listados"> Nombre: <p>${datos.name}</p> /<p>Id: ${datos.id}</p> /Precio: <p>${datos.price}$</p>
                </li>
            `;

            htmlProducto += "</ul>";

            contenedorProductos.innerHTML = htmlProducto;
        }

    </script>
</body>
</html>
