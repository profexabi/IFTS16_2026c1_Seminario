    <h1>Listado Productos</h1>

    <main>
        <div id="contenedor-productos">
            <!--
            <div class="card-producto">
                <img src="https://cdn11.bigcommerce.com/s-3stx4pub31/images/stencil/160w/products/9026/27419/Fernet_Branca_Herbal_Infusion_Bitter_Amaro_Liqueur_Genuine_Argentina_Flavor_Recipe_750_ml_25.4_oz_pack_of_2__06645.1707510967.jpg?c=3" alt="fernet branca" class="img-producto">
                <h3>Fernet Branca</h3>
                <p>Id: 1</p>
                <p>7000$</p>
            </div>
            -->
        </div>
    </main>

    <script>
        let contenedorProductos = document.getElementById("contenedor-productos");

        async function mostrarProductos() {
            try {

                const respuesta = await fetch("http://localhost:3000/api/products");

                // Verificamos que la respuesta HTTP fue exitosa antes de parsear
                if (!respuesta.ok) {
                    throw new Error(`Error del servidor: ${respuesta.status}`);
                }

                const { payload } = await respuesta.json();
                console.log(payload); // Recibo correctamente el array de productos

                renderizarProductos(payload);

            // El catch solo nos captura errores reales de red: no hay internet, servidor caido
            } catch (error) {
                console.error(`Error al cargar productos:`, error);

                // Mostramos el error en el DOM
                contenedorProductos.innerHTML = `<p class="info error">No se pudieron cargar los productos</p>`
            }
        }


        function renderizarProductos(payload) {
            let htmlProductos = "";

                // Creamos el HTML dinamico por cada producto de nuestra BBDD
                payload.forEach(prod => {
                    htmlProductos += `
                        <div class="card-producto">
                            <img src="${prod.image}" alt="${prod.name}" class="img-producto">
                            <h3>${prod.name}</h3>
                            <p>Id: ${prod.id}</p>
                            <p>${prod.price}$</p>
                        </div>
                    `;
                });

                // Inyectamos todo el HTML dentro de nuestro contenedor
                contenedorProductos.innerHTML = htmlProductos;
        }

        mostrarProductos();
    </script>
</body>
</html>
