<body>

    <header>

    </header>
    <h1>Crear un producto</h1>

    <main>

        <form id="postProduct-form" class="formAltaProducto">

            <!-- Categoria -->
            <label for="category" id="categoryProd">Categoria</label>
            <select name="category" id="categoryProd">
                <option value="food">food</option>
                <option value="drink">drink</option>
            </select>

            <!-- Imagen -->
             <label for="imageProd">Imagen</label>
             <input type="text" name="image" id="imageProd" required>

             <!-- Nombre -->
             <label for="nameProd">Nombre</label>
             <input type="text" name="name" id="nameProd" required>

             <!-- Precio -->
              <label for="priceProd">Precio</label>
              <input type="number" name="price" id="priceProd" required>


              <input type="submit" class="btn-envio" value="Crear producto">

        </form>

        <hr>

        <div id="contenedor-productos">

        </div>
    </main>

    <script>
        const postProductForm = document.getElementById("postProduct-form");
        const url = "http://localhost:3000/api/products/";

        postProductForm.addEventListener("submit", async event => {

            event.preventDefault(); // Evitamos el envio por defecto del formulario

            // Obtenemos la data del formulario en un objeto FormData
            let formData = new FormData(event.target);

            // Transformamos el objeto FormData en un objeto JavaScript
            let data = Object.fromEntries(formData.entries());

            console.log(data); // {category: 'food', image: 'https://i.pinimg.com/736x/62/30/69/623069e6f22cf5a30d2a326aa5b34221.jpg', name: 'coso', price: '123'}

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type" : "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if(response.ok) {
                    console.log(response);
                    console.log(result);

                    console.log(result.message);
                    alert(result.message);

                }



            } catch (error) {
                console.error("Error al enviar los datos: ", error);
                alert("Error al procesar la solicitud");
            }
        })
    </script>
</body>
</html>
